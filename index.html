    <div id="difficulty-menu">

            <button class="menu-btn btn-hard" onclick="startGame('hard')">HARD</button>
        </div>
    </div>

    <div id="game-over-menu">
        <div class="menu-title">GAME OVER</div>
        <div id="final-score-display" style="color:white; font-size:28px; font-weight:700; margin-bottom:40px;">Score: 0</div>
        <div class="btn-container">
            <button class="menu-btn" id="restart-btn">RETRY</button>
            <button class="menu-btn" id="main-menu-btn">MENU</button>
        </div>
    </div>

    <div id="ui-layer">
        <div id="score">0</div>
        <div style="font-size: 14px; letter-spacing: 4px; opacity: 0.7;">SPACE OR CLICK TO DROP</div>
    </div>

    <div id="compliment-layer">
        <div id="compliment">PERFECT!</div>
    </div>

    <script>
        const config = {
            easy: { start: 0.07, growth: 0.002 },
            medium: { start: 0.14, growth: 0.005 },
            hard: { start: 0.22, growth: 0.008 }
        };

        const scene = new THREE.Scene();
        const aspect = window.innerWidth / window.innerHeight;
        const d = 10;
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 100);
        camera.position.set(10, 10, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight.position.set(10, 20, 5);
        scene.add(dirLight);

        let stack = [], overhangs = [], pulseRings = [];
        const boxHeight = 1, originalBoxSize = 6;
        let gameState = "MENU", streakCount = 0, currentPlayerName = "Guest";
        let baseSpeed = 0.1, speedMultiplier = 1;
        let moveDir = 1;

        const shapes = ['cube', 'cylinder', 'hexagon', 'star'];
        let currentShapeIndex = 0;

        function saveScore(score) {
            if(score <= 0) return;
            let s = JSON.parse(localStorage.getItem('funTowerScores')) || [];
            s.push({ name: currentPlayerName, score: score });
            s.sort((a,b) => b.score - a.score);
            localStorage.setItem('funTowerScores', JSON.stringify(s.slice(0, 10)));
        }

        function updateLeaderboardUI() {
            const lb = document.getElementById('leaderboard');
            let s = JSON.parse(localStorage.getItem('funTowerScores')) || [];
            if(s.length === 0) { lb.innerHTML = "<div style='text-align:center; opacity:0.5;'>NO HIGH SCORES YET</div>"; return; }
            lb.innerHTML = "<div style='font-weight:900; margin-bottom:15px; text-align:center;'>LEADERBOARD</div>" + 
                s.map((e, i) => `<div style="display:flex; justify-content:space-between; margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:4px;"><span>${i+1}. ${e.name}</span><span>${e.score}</span></div>`).join('');
        }

        function getGeometry(w, d) {
            const r = Math.min(w, d) / 2;
            const s = shapes[currentShapeIndex];
            if(s === 'cylinder') return new THREE.CylinderGeometry(r, r, boxHeight, 32);
            if(s === 'hexagon') return new THREE.CylinderGeometry(r, r, boxHeight, 6);
            if(s === 'star') {
                const shape = new THREE.Shape();
                for(let i=0; i<10; i++) {
                    const radius = (i%2===0) ? r : r*0.5;
                    const a = (i/10)*Math.PI*2 + (Math.PI/2);
                    if(i===0) shape.moveTo(Math.cos(a)*radius, Math.sin(a)*radius);
                    else shape.lineTo(Math.cos(a)*radius, Math.sin(a)*radius);
                }
                const geom = new THREE.ExtrudeGeometry(shape, { depth: boxHeight, bevelEnabled: false });
                geom.center(); geom.rotateX(Math.PI/2); return geom;
            }
            return new THREE.BoxGeometry(w, boxHeight, d);
        }

        function initGame() {
            stack.forEach(b => scene.remove(b.mesh));
            overhangs.forEach(o => scene.remove(o));
            pulseRings.forEach(r => scene.remove(r));
            stack = []; overhangs = []; streakCount = 0; pulseRings = [];
            camera.position.set(10, 10, 10); camera.lookAt(0, 0, 0);
            document.getElementById('score').innerText = "0";
            addLayer(0, 0, originalBoxSize, originalBoxSize, 'x');
            addLayer(-10, 0, originalBoxSize, originalBoxSize, 'x');
        }

        function addLayer(x, z, width, depth, direction) {
            const y = stack.length * boxHeight;
            const geo = getGeometry(width, depth);
            const hue = (190 + (Math.floor(stack.length/7)*25)) % 360;
            const mat = new THREE.MeshLambertMaterial({ color: new THREE.Color(`hsl(${hue}, 80%, 55%)`) });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            stack.push({ mesh, width, depth, direction });
            camera.position.y += boxHeight; camera.lookAt(0, camera.position.y - 10, 0);
        }

        // --- ✨ BORDER EFFECT LOGIC ✨ ---
        function createPulseRing(targetMesh) {
            const edges = new THREE.EdgesGeometry(targetMesh.geometry);
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1 });
            const pulse = new THREE.LineSegments(edges, lineMat);
            pulse.position.copy(targetMesh.position);
            scene.add(pulse);
            pulseRings.push(pulse);
        }

        function triggerDrop() {
            if(gameState === "PLAYING") dropBlock();
        }

        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') {
                if(document.activeElement.id !== 'player-name') {
                    e.preventDefault();
                    triggerDrop();
                }
            }
        });

        window.addEventListener('mousedown', (e) => {
            if(e.target.tagName !== "BUTTON" && e.target.tagName !== "INPUT") triggerDrop();
        });

        document.getElementById('play-btn').addEventListener('click', () => {
            currentPlayerName = document.getElementById('player-name').value.trim() || "Player";
            document.getElementById('start-menu').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('start-menu').style.display = "none";
                document.getElementById('difficulty-menu').style.display = "flex";
                setTimeout(() => document.getElementById('difficulty-menu').style.opacity = 1, 50);
            }, 500);
        });

        function startGame(mode) {
            baseSpeed = config[mode].start;
            speedMultiplier = config[mode].growth;
            document.getElementById('difficulty-menu').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('difficulty-menu').style.display = "none";
                document.getElementById('ui-layer').style.opacity = 1;
                initGame(); gameState = "PLAYING";
            }, 500);
        }

        function dropBlock() {
            const top = stack[stack.length - 1];
            const prev = stack[stack.length - 2];
            let dir = top.direction;
            let size = dir === 'x' ? top.width : top.depth;
            let delta = top.mesh.position[dir] - prev.mesh.position[dir];
            let overhang = Math.abs(delta);
            let overlap = size - overhang;

            if(overlap > 0) {
                let isPerfect = overhang < 0.25;
                if(isPerfect) {
                    streakCount++;
                    top.mesh.position[dir] = prev.mesh.position[dir];
                    
                    // Trigger border effect on perfect placement
                    createPulseRing(top.mesh);

                    if(streakCount >= 2) {
                        const el = document.getElementById('compliment');
                        el.classList.add('show');
                        setTimeout(() => el.classList.remove('show'), 800);
                    }
                } else {
                    streakCount = 0;
                    let nw = dir === 'x' ? overlap : top.width;
                    let nd = dir === 'z' ? overlap : top.depth;
                    top.mesh.geometry = getGeometry(nw, nd);
                    top.mesh.position[dir] = prev.mesh.position[dir] + (delta/2);
                    top.width = nw; top.depth = nd;
                }
                document.getElementById('score').innerText = stack.length - 1;
                const next = dir === 'x' ? 'z' : 'x';
                addLayer(next === 'x' ? -10 : top.mesh.position.x, next === 'z' ? -10 : top.mesh.position.z, top.width, top.depth, next);
            } else {
                gameState = "ENDED";
                saveScore(stack.length - 1);
                document.getElementById('ui-layer').style.opacity = 0;
                document.getElementById('final-score-display').innerText = `SCORE: ${stack.length - 1}`;
                document.getElementById('game-over-menu').style.display = "flex";
                setTimeout(() => document.getElementById('game-over-menu').style.opacity = 1, 50);
            }
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-menu').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('game-over-menu').style.display = "none";
                document.getElementById('difficulty-menu').style.display = "flex";
                setTimeout(() => document.getElementById('difficulty-menu').style.opacity = 1, 50);
            }, 500);
        });

        document.getElementById('main-menu-btn').addEventListener('click', () => {
            location.reload();
        });

        document.getElementById('shape-btn').addEventListener('click', () => {
            currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
            document.getElementById('shape-btn').innerText = shapes[currentShapeIndex].toUpperCase();
            initGame();
        });

        function animate() {
            requestAnimationFrame(animate);
            if(gameState === "PLAYING") {
                const top = stack[stack.length - 1];
                let speedFactor = baseSpeed + (stack.length * speedMultiplier);
                top.mesh.position[top.direction] += (speedFactor * moveDir);
                if(top.mesh.position[top.direction] > 10) moveDir = -1;
                if(top.mesh.position[top.direction] < -10) moveDir = 1;
            }

            // Animate falling debris
            overhangs.forEach(o => o.position.y -= 0.3);

            // ✨ Animate pulse rings (Border Effect) ✨
            for (let i = pulseRings.length - 1; i >= 0; i--) {
                let ring = pulseRings[i];
                ring.scale.x += 0.05;
                ring.scale.z += 0.05;
                ring.material.opacity -= 0.05;
                if (ring.material.opacity <= 0) {
                    scene.remove(ring);
                    pulseRings.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        updateLeaderboardUI();
        initGame();
        animate();
    </script>
</body>

                    const radius = (i%2===0) ? r : r*0.5;
                    const a = (i/10)*Math.PI*2 + (Math.PI/2);
                    if(i===0) shape.moveTo(Math.cos(a)*radius, Math.sin(a)*radius);
                    else shape.lineTo(Math.cos(a)*radius, Math.sin(a)*radius);
                }
                const geom = new THREE.ExtrudeGeometry(shape, { depth: boxHeight, bevelEnabled: false });
                geom.center(); geom.rotateX(Math.PI/2); return geom;
            }
            return new THREE.BoxGeometry(w, boxHeight, d);
        }

        function initGame() {
            stack.forEach(b => scene.remove(b.mesh));
            overhangs.forEach(o => scene.remove(o));
            pulseRings.forEach(r => scene.remove(r));
            stack = []; overhangs = []; pulseRings = []; streakCount = 0;
            camera.position.set(10, 10, 10); camera.lookAt(0, 0, 0);
            document.getElementById('score').innerText = "0";
            addLayer(0, 0, originalBoxSize, originalBoxSize, 'x');
            addLayer(-10, 0, originalBoxSize, originalBoxSize, 'x');
        }

        function addLayer(x, z, width, depth, direction) {
            const y = stack.length * boxHeight;
            const geo = getGeometry(width, depth);
            const hue = (190 + (Math.floor(stack.length/7)*25)) % 360;
            const mat = new THREE.MeshLambertMaterial({ color: new THREE.Color(`hsl(${hue}, 80%, 55%)`) });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            stack.push({ mesh, width, depth, direction });
            camera.position.y += boxHeight; camera.lookAt(0, camera.position.y - 10, 0);
        }

        function createPulseRing(targetMesh) {
            const edges = new THREE.EdgesGeometry(targetMesh.geometry);
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1 });
            const pulse = new THREE.LineSegments(edges, lineMat);
            pulse.position.copy(targetMesh.position);
            scene.add(pulse);
            pulseRings.push(pulse);
        }

        function triggerDrop() {
            if(gameState === "PLAYING") dropBlock();
        }

        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space' && document.activeElement.id !== 'player-name') {
                e.preventDefault(); triggerDrop();
            }
        });

        window.addEventListener('mousedown', (e) => {
            if(e.target.tagName !== "BUTTON" && e.target.tagName !== "INPUT") triggerDrop();
        });

        document.getElementById('play-btn').addEventListener('click', () => {
            currentPlayerName = document.getElementById('player-name').value.trim() || "Player";
            document.getElementById('start-menu').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('start-menu').style.display = "none";
                document.getElementById('difficulty-menu').style.display = "flex";
                setTimeout(() => document.getElementById('difficulty-menu').style.opacity = 1, 50);
            }, 500);
        });

        function startGame(mode) {
            baseSpeed = config[mode].start;
            speedMultiplier = config[mode].growth;
            document.getElementById('difficulty-menu').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('difficulty-menu').style.display = "none";
                document.getElementById('ui-layer').style.opacity = 1;
                initGame(); gameState = "PLAYING";
            }, 500);
        }

        function dropBlock() {
            const top = stack[stack.length - 1];
            const prev = stack[stack.length - 2];
            let dir = top.direction;
            let size = dir === 'x' ? top.width : top.depth;
            let delta = top.mesh.position[dir] - prev.mesh.position[dir];
            let overhang = Math.abs(delta);
            let overlap = size - overhang;

            if(overlap > 0) {
                let isPerfect = overhang < 0.25;
                if(isPerfect) {
                    streakCount++;
                    top.mesh.position[dir] = prev.mesh.position[dir];
                    createPulseRing(top.mesh);
                    if(streakCount >= 2) {
                        const el = document.getElementById('compliment');
                        el.classList.add('show');
                        setTimeout(() => el.classList.remove('show'), 800);
                    }
                } else {
                    streakCount = 0;
                    let nw = dir === 'x' ? overlap : top.width;
                    let nd = dir === 'z' ? overlap : top.depth;
                    top.mesh.geometry = getGeometry(nw, nd);
                    top.mesh.position[dir] = prev.mesh.position[dir] + (delta/2);
                    top.width = nw; top.depth = nd;
                }
                document.getElementById('score').innerText = stack.length - 1;
                const next = dir === 'x' ? 'z' : 'x';
                addLayer(next === 'x' ? -10 : top.mesh.position.x, next === 'z' ? -10 : top.mesh.position.z, top.width, top.depth, next);
            } else {
                gameState = "ENDED";
                saveScore(stack.length - 1);
                document.getElementById('ui-layer').style.opacity = 0;
                document.getElementById('final-score-display').innerText = `SCORE: ${stack.length - 1}`;
                document.getElementById('game-over-menu').style.display = "flex";
                setTimeout(() => document.getElementById('game-over-menu').style.opacity = 1, 50);
            }
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-menu').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('game-over-menu').style.display = "none";
                document.getElementById('difficulty-menu').style.display = "flex";
                setTimeout(() => document.getElementById('difficulty-menu').style.opacity = 1, 50);
            }, 500);
        });

        document.getElementById('main-menu-btn').addEventListener('click', () => { location.reload(); });

        document.getElementById('shape-btn').addEventListener('click', () => {
            currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
            document.getElementById('shape-btn').innerText = shapes[currentShapeIndex].toUpperCase();
            initGame();
        });

        function animate() {
            requestAnimationFrame(animate);
            if(gameState === "PLAYING") {
                const top = stack[stack.length - 1];
                let speedFactor = baseSpeed + (stack.length * speedMultiplier);
                top.mesh.position[top.direction] += (speedFactor * moveDir);
                if(top.mesh.position[top.direction] > 10) moveDir = -1;
                if(top.mesh.position[top.direction] < -10) moveDir = 1;
            }
            overhangs.forEach(o => o.position.y -= 0.3);
            for (let i = pulseRings.length - 1; i >= 0; i--) {
                let ring = pulseRings[i];
                ring.scale.x += 0.05;
                ring.scale.z += 0.05;
                ring.material.opacity -= 0.05;
                if (ring.material.opacity <= 0) {
                    scene.remove(ring);
                    pulseRings.splice(i, 1);
                }
            }
            renderer.render(scene, camera);
        }

        updateLeaderboardUI();
        initGame();
        animate();
    </script>
</body>
</html>
